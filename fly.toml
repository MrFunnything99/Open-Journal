# Fly.io app: monolith (FastAPI + built React frontend).
# Deploy from repo root:  cd /path/to/Open-Journal  &&  fly deploy
# See https://fly.io/docs/reference/configuration/

app = "backend-cold-meadow-9174"
primary_region = 'iad'

[build]
  dockerfile = "backend/Dockerfile"

[env]
  VECTOR_DB_PATH = "/data/open_journal.db"
  ENVIRONMENT = "production"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
