# Fly.io app: monolith (FastAPI + built React frontend) for Selfmeridian.
# Deploy from repo root:  cd /path/to/Selfmeridian  &&  fly deploy
# See https://fly.io/docs/reference/configuration/

app = "backend-cold-meadow-9174"
primary_region = 'iad'

[build]
  dockerfile = "backend/Dockerfile"

[env]
  VECTOR_DB_PATH = "/data/open_journal.db"
  ENVIRONMENT = "production"
  LIGHTRAG_ENABLED = "false"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep 1 machine running so requests (e.g. Recommendations) don't hit a machine that's stopping
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
